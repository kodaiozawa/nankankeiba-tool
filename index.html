<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南関競馬 予想法ツール</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #0f1620; color: #e0e0e0; padding: 15px; line-height: 1.6; }
        h1 { color: #ffcc00; text-align: center; }
        label { display: block; margin: 15px 0 8px; font-weight: bold; }
        select, button { padding: 14px; margin: 10px 0; font-size: 17px; width: 100%; max-width: 420px; border-radius: 8px; }
        button { background: #ffcc00; color: black; font-weight: bold; border: none; cursor: pointer; }
        button:hover { background: #ffd633; }
        .result { background: #1e2a3a; padding: 20px; border-radius: 12px; margin-top: 25px; }
        .buy { color: #00ff88; font-weight: bold; }
        .dontbuy { color: #ff6666; font-weight: bold; }
    </style>
</head>
<body>
    <h1>南関競馬 予想法ツール</h1>
    
    <label>会場</label>
    <select id="venue">
        <option value="大井">大井</option>
        <option value="川崎">川崎</option>
        <option value="船橋">船橋</option>
        <option value="浦和">浦和</option>
    </select>

    <label>レース番号</label>
    <select id="race">
        <option value="1">1R</option><option value="2">2R</option><option value="3">3R</option>
        <option value="4">4R</option><option value="5">5R</option><option value="6">6R</option>
        <option value="7">7R</option><option value="8">8R</option><option value="9">9R</option>
        <option value="10">10R</option><option value="11">11R</option><option value="12">12R</option>
    </select>

    <label>馬場</label>
    <select id="track">
        <option value="稍重">稍重</option>
        <option value="重">重</option>
        <option value="良">良</option>
    </select><br><br>

    <button onclick="generatePrediction()">今日のスタイルで予想生成</button>

    <div id="result" class="result"></div>

    <script>
    function generatePrediction() {
        const venue = document.getElementById('venue').value;
        const raceNo = parseInt(document.getElementById('race').value);
        const track = document.getElementById('track').value;

        // 今日のあなたの予想スタイルを反映
        let axis = 7;
        if ([10, 12].includes(raceNo)) axis = 8;
        if (raceNo === 11) axis = 10;
        if (raceNo <= 4) axis = 6;

        let confidence = (track === "稍重" || track === "重") ? 84 : 72;
        let expect = (track === "稍重" || track === "重") ? "やや高め" : "普通";

        let html = `<h2>${venue} ${raceNo}R　${track}馬場</h2>`;
        html += `<p><strong>推奨軸:</strong> ${axis}番（好位パワー型）</p>`;
        html += `<p><strong>自信度:</strong> ${confidence}%</p>`;
        html += `<p class="buy"><strong>期待値: ${expect}</strong><br>買う価値あり</p>`;
        
        html += `<h3>3連単一点（1000円）</h3><p>${axis} → ${axis+5} → ${axis+3}</p>`;
        html += `<h3>フォーメーション（1200円）</h3>`;
        html += `<p>1着: ${axis}<br>2着: ${axis+5}・${axis+3}・${axis+2}<br>3着: ${axis+5}・${axis+3}・${axis+2}・9・4</p>`;
        html += `<p><strong>馬単（500円）</strong><br>${axis} → ${axis+5}　300円<br>${axis} → ${axis+3}　200円</p>`;
        html += `<p><strong>合計: 3000円</strong></p>`;

        document.getElementById('result').innerHTML = html;
    }
    </script>
</body>
</html>
